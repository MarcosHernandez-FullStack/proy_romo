<div class="p-8 flex flex-col gap-6 bg-[#f9fafb] min-h-full">

  <!-- Header -->
  <div>
    <h1 class="text-[#101828] text-[30px] font-bold">Configuración del Sistema</h1>
    <p class="text-[#4a5565] text-[14px] mt-0.5">Gestión de tarifas por cliente y parámetros operativos globales</p>
  </div>

  <!-- Tab bar -->
  <div class="bg-white border border-[#e5e7eb] rounded-[14px] shadow-sm overflow-hidden">
    <div class="flex border-b border-[#e5e7eb]">
      <button type="button" (click)="tab.set('tarifas')"
        class="flex items-center gap-2 px-6 py-4 text-[14px] font-semibold border-b-2 transition-colors cursor-pointer"
        [class.border-[#155dfc]]="tab() === 'tarifas'"
        [class.text-[#155dfc]]="tab() === 'tarifas'"
        [class.bg-[#eff6ff]]="tab() === 'tarifas'"
        [class.border-transparent]="tab() !== 'tarifas'"
        [class.text-[#4a5565]]="tab() !== 'tarifas'">
        <lucide-angular [img]="DollarSignIcon" class="size-4" [strokeWidth]="1.5" />
        Tarifas por Cliente B2B
      </button>
      <button type="button" (click)="tab.set('parametros')"
        class="flex items-center gap-2 px-6 py-4 text-[14px] font-semibold border-b-2 transition-colors cursor-pointer"
        [class.border-[#155dfc]]="tab() === 'parametros'"
        [class.text-[#155dfc]]="tab() === 'parametros'"
        [class.bg-[#eff6ff]]="tab() === 'parametros'"
        [class.border-transparent]="tab() !== 'parametros'"
        [class.text-[#4a5565]]="tab() !== 'parametros'">
        <lucide-angular [img]="SlidersIcon" class="size-4" [strokeWidth]="1.5" />
        Parámetros Operativos
      </button>
    </div>

    <div class="p-6">
      @if (tab() === 'tarifas') {
        <app-tarifas [clientes]="clientes()" />
      }
      @if (tab() === 'parametros') {
        <app-parametros />
      }
    </div>
  </div>
</div>
