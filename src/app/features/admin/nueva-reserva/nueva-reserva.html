<div class="p-4 md:p-8 flex flex-col gap-6 bg-[#f9fafb] min-h-full">

  <!-- Header -->
  <div class="flex items-center gap-4">
    <div class="size-12 bg-[#f0fdf4] border border-[#7bf1a8] rounded-[12px] flex items-center justify-center">
      <lucide-angular [img]="PhoneIcon" class="size-6" color="#00a63e" [strokeWidth]="1.5" />
    </div>
    <div>
      <h1 class="text-[#101828] text-[28px] font-bold leading-tight">Nueva Reserva Telefónica</h1>
      <p class="text-[#4a5565] text-[14px] mt-0.5">Sistema de reserva B2B con gestión de agenda en tiempo real</p>
    </div>
  </div>

  <!-- Section 0: Tipo de Carga -->
  <app-tipo-carga
    [tipoCarga]="tipoCarga()"
    [cantidadVehiculos]="cantidadVehiculos()"
    (tipoCargaChange)="tipoCarga.set($event)"
    (cantidadVehiculosChange)="cantidadVehiculos.set($event)" />

  <!-- Section 1: Selección de Cliente (shown after step 0 complete) -->
  @if (step0Complete()) {
    <app-seleccion-cliente
      [clientes]="clientes()"
      [clienteId]="clienteId()"
      [origen]="origen()"
      [destino]="destino()"
      (clienteIdChange)="clienteId.set($event)"
      (origenChange)="origen.set($event)"
      (destinoChange)="destino.set($event)"
      (rutaChange)="onRutaChange($event)"
      (tarifaChange)="onTarifaChange($event)"
      (parametroChange)="onParametroChange($event)" />
  }

  <!-- Section 2: Selección de Agenda (shown after step 1 complete) -->
  @if (step1Complete()) {
    <app-seleccion-agenda
      [fechas]="fechas()"
      [fechaIdx]="fechaIdx()"
      [fechaLabel]="fechaLabel()"
      [slots]="slots()"
      [horarioValidado]="horarioValidado()"
      [bloques]="bloques()"
      [conflictoBloque]="conflictoBloque()"
      (selectFecha)="onSelectFecha($event)"
      (selectSlot)="onSelectSlot($event)"
      (validar)="onValidarHorario()"
      (editar)="onEditar()" />
  }

  <!-- Section 3: Detalles del Vehículo (shown after step 2 complete) -->
  @if (step2Complete()) {
    <app-detalles-vehiculo
      [tipoCarga]="tipoCarga()"
      [cantidadVehiculos]="cantidadVehiculos()"
      [step1Complete]="step1Complete()"
      [step2Complete]="step2Complete()"
      (confirmar)="onVehiculosConfirmados($event)" />
  }

</div>

@if (showConfirm()) {
  <app-confirmacion-reserva
    [datos]="datosReserva()"
    (confirmar)="onConfirmarReserva()"
    (cerrar)="showConfirm.set(false)" />
}

@if (showSuccess()) {
  <app-reserva-exitosa
    [servicioId]="servicioCreado()"
    (nuevaReserva)="onNuevaReserva()" />
}

@if (modal()) {
  <app-mensaje-modal
    [tipo]="modal()!.tipo"
    [titulo]="modal()!.titulo"
    [mensaje]="modal()!.mensaje"
    (cerrar)="modal.set(null)" />
}
