<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-[480px] overflow-hidden">

    <div class="px-6 py-10 flex flex-col items-center text-center gap-5">

      <!-- Phone icon in green circle -->
      <div class="size-20 bg-[#f0fdf4] border-2 border-[#7bf1a8] rounded-full flex items-center justify-center">
        <lucide-angular [img]="PhoneIcon" class="size-10" color="#00a63e" [strokeWidth]="1.5" />
      </div>

      <div>
        <h2 class="text-[#101828] text-[26px] font-bold">¡Reserva Creada Exitosamente!</h2>
        <p class="text-[#6a7282] text-[14px] mt-1">El servicio ha sido registrado en el sistema</p>
      </div>

      <!-- Service ID box -->
      <div class="bg-[#eff6ff] border border-[#bedbff] rounded-[14px] px-8 py-4 w-full">
        <p class="text-[#6a7282] text-[12px] uppercase tracking-wider font-semibold mb-1">ID de Servicio</p>
        <p class="text-[#155dfc] text-[34px] font-bold font-mono">{{ servicioId() }}</p>
      </div>

      <p class="text-[#6a7282] text-[13px]">
        Puede asignar operador y unidad desde el módulo<br>
        de <span class="font-semibold text-[#364153]">Operaciones</span>
      </p>

    </div>

    <div class="px-6 pb-6">
      <button type="button" (click)="nuevaReserva.emit()"
        class="w-full border border-[#d1d5dc] text-[#364153] text-[14px] font-medium rounded-[10px] h-10 hover:bg-[#f9fafb] transition-colors cursor-pointer">
        Crear Nueva Reserva
      </button>
    </div>

  </div>
</div>
