<div class="bg-white border border-[#e5e7eb] rounded-[14px] shadow-sm p-6 flex flex-col gap-5">

  <!-- Section header -->
  <div class="flex items-center gap-3">
    <div class="size-7 bg-[#155dfc] rounded-full flex items-center justify-center shrink-0">
      <span class="text-white text-[12px] font-bold">1</span>
    </div>
    <div>
      <h2 class="text-[#101828] text-[18px] font-bold">Selección de Cliente y Configuración del Servicio</h2>
      <p class="text-[#6a7282] text-[13px]">Seleccione el cliente y defina la ruta del servicio</p>
    </div>
  </div>

  <!-- Cliente selector -->
  <div>
    <label class="flex items-center gap-1.5 text-[#364153] text-[13px] font-semibold mb-1.5">
      <lucide-angular [img]="Building2Icon" class="size-4" color="#364153" [strokeWidth]="1.5" />
      Seleccionar Cliente B2B *
    </label>
    <select [ngModel]="clienteId()" (ngModelChange)="clienteIdChange.emit($event)" name="clienteId"
      class="w-full border border-[#d1d5dc] rounded-[10px] px-3 py-2.5 text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc] bg-white cursor-pointer">
      <option value="">Seleccionar cliente...</option>
      @for (c of clientes(); track c.id) {
        @if (c.activo) {
          <option [value]="c.id">{{ c.id }} - {{ c.empresa }} (${{ c.tarifaKm }} USD/km)</option>
        }
      }
    </select>
    @if (clienteSeleccionado()) {
      <div class="mt-2 bg-[#eff6ff] border border-[#bedbff] rounded-[10px] px-4 py-2.5 flex items-center gap-4">
        <div class="flex items-center gap-1.5">
          <lucide-angular [img]="Building2Icon" class="size-3.5" color="#155dfc" [strokeWidth]="1.5" />
          <span class="text-[#364153] text-[13px]">Empresa: <strong class="text-[#101828]">{{ clienteSeleccionado()!.empresa }}</strong></span>
        </div>
        <div class="w-px h-4 bg-[#bedbff]"></div>
        <span class="text-[#364153] text-[13px]">Tarifa: <strong class="text-[#155dfc]">${{ clienteSeleccionado()!.tarifaKm }} USD/km</strong></span>
      </div>
    }
  </div>

  <!-- Origen / Destino -->
  <div class="grid grid-cols-2 gap-4">
    <div>
      <label class="flex items-center gap-1.5 text-[#364153] text-[13px] font-semibold mb-1.5">
        <lucide-angular [img]="MapPinIcon" class="size-4" color="#00a63e" [strokeWidth]="1.5" />
        Dirección de Origen *
      </label>
      <input type="text" [ngModel]="origen()" (ngModelChange)="origenChange.emit($event)" name="origen"
        placeholder="Ej. Av. Corrientes 1234, CABA..."
        class="w-full border border-[#d1d5dc] rounded-[10px] px-3 py-2.5 text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc]" />
    </div>
    <div>
      <label class="flex items-center gap-1.5 text-[#364153] text-[13px] font-semibold mb-1.5">
        <lucide-angular [img]="NavigationIcon" class="size-4" color="#e7000b" [strokeWidth]="1.5" />
        Dirección de Destino *
      </label>
      <input type="text" [ngModel]="destino()" (ngModelChange)="destinoChange.emit($event)" name="destino"
        placeholder="Ej. Av. 9 de Julio 567, CABA..."
        class="w-full border border-[#d1d5dc] rounded-[10px] px-3 py-2.5 text-[14px] text-[#101828] focus:outline-none focus:border-[#155dfc]" />
    </div>
  </div>

  <!-- Map placeholder -->
  <div class="rounded-[12px] border border-[#e5e7eb] overflow-hidden bg-[#f3f4f6]" style="height: 180px;">
    <div class="w-full h-full flex flex-col items-center justify-center gap-2">
      <lucide-angular [img]="MapPinIcon" class="size-10" color="#d1d5dc" [strokeWidth]="1" />
      <p class="text-[#9ca3af] text-[13px] font-medium">Mapa de Referencia</p>
      <p class="text-[#9ca3af] text-[11px]">Visualización de Ruta</p>
    </div>
  </div>

</div>
