<div class="bg-white border border-[#e5e7eb] rounded-[14px] shadow-sm p-6">
  <div class="flex items-center gap-2 mb-6">
    <div class="size-10 bg-[#ffe2e2] rounded-[10px] flex items-center justify-center shrink-0">
      <lucide-angular [img]="AlertCircleIcon" class="size-5" color="#c10007" [strokeWidth]="1.5" />
    </div>
    <div>
      <h2 class="text-[#101828] text-[18px] font-bold">Alertas del Sistema</h2>
      <p class="text-[#6a7282] text-[12px]">Monitoreo de situaciones críticas</p>
    </div>
  </div>

  <div class="flex flex-col gap-3">
    <div class="bg-[#fef2f2] border border-[#ffa2a2] rounded-[10px] px-4 py-3">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <lucide-angular [img]="AlertCircleIcon" class="size-4" color="#101828" [strokeWidth]="1.5" />
          <span class="text-[#101828] text-[14px] font-bold">Servicios Críticos</span>
        </div>
        <div class="bg-[#e7000b] text-white text-[12px] font-bold rounded-full size-6 flex items-center justify-center">3</div>
      </div>
      <p class="text-[#c10007] text-[12px]">Servicios próximos (4hrs) sin asignar</p>
    </div>

    <div class="bg-[#fffbeb] border border-[#ffd230] rounded-[10px] px-4 py-3">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <lucide-angular [img]="FileWarningIcon" class="size-4" color="#101828" [strokeWidth]="1.5" />
          <span class="text-[#101828] text-[14px] font-bold">Documentación</span>
        </div>
        <div class="bg-[#e17100] text-white text-[12px] font-bold rounded-full size-6 flex items-center justify-center">2</div>
      </div>
      <p class="text-[#bb4d00] text-[12px]">Licencias vencidas - Recordatorio administrativo</p>
    </div>

    <div class="bg-[#fffbeb] border border-[#ffd230] rounded-[10px] px-4 py-3">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <lucide-angular [img]="WrenchIcon" class="size-4" color="#101828" [strokeWidth]="1.5" />
          <span class="text-[#101828] text-[14px] font-bold">Unidades en Taller</span>
        </div>
        <div class="bg-[#e17100] text-white text-[12px] font-bold rounded-full size-6 flex items-center justify-center">1</div>
      </div>
      <p class="text-[#bb4d00] text-[12px]">Grúas fuera de servicio por mantenimiento</p>
    </div>
  </div>

  <div class="border-t border-[#e5e7eb] mt-4 pt-3 flex items-center justify-between">
    <span class="text-[#4a5565] text-[12px] font-semibold">Total de Alertas Activas:</span>
    <div class="bg-[#ffe2e2] rounded-full px-3 py-0.5">
      <span class="text-[#c10007] text-[14px] font-bold">6</span>
    </div>
  </div>
</div>
