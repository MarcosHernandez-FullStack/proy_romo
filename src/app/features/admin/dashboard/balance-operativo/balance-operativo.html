<div class="bg-white border border-[#e5e7eb] rounded-[14px] shadow-sm p-6">
  <div class="flex items-center gap-2 mb-6">
    <div class="size-10 bg-[#fef3c6] rounded-[10px] flex items-center justify-center shrink-0">
      <lucide-angular [img]="TruckIcon" class="size-5" color="#bb4d00" [strokeWidth]="1.5" />
    </div>
    <div>
      <h2 class="text-[#101828] text-[18px] font-bold">Balance Operativo</h2>
      <p class="text-[#6a7282] text-[12px]">Capacidad logística actual</p>
    </div>
  </div>

  <div class="mb-4">
    <div class="flex items-center justify-between mb-2">
      <div class="flex items-center gap-2">
        <lucide-angular [img]="TruckIcon" class="size-4" color="#364153" [strokeWidth]="1.5" />
        <span class="text-[#364153] text-[14px] font-semibold">Grúas Activas</span>
      </div>
      <span class="text-[#1447e6] text-[24px] font-bold">4</span>
    </div>
    <div class="h-2.5 bg-[#e5e7eb] rounded-full">
      <div class="h-2.5 bg-[#155dfc] rounded-full w-full"></div>
    </div>
  </div>

  <div class="mb-4">
    <div class="flex items-center justify-between mb-2">
      <div class="flex items-center gap-2">
        <lucide-angular [img]="UsersIcon" class="size-4" color="#364153" [strokeWidth]="1.5" />
        <span class="text-[#364153] text-[14px] font-semibold">Operadores Disponibles</span>
      </div>
      <span class="text-[#008236] text-[24px] font-bold">{{ operadoresDisponibles() }}</span>
    </div>
    <div class="h-2.5 bg-[#e5e7eb] rounded-full">
      <div class="h-2.5 bg-[#00a63e] rounded-full w-3/4"></div>
    </div>
  </div>

  <div class="bg-[#fffbeb] border border-[#ffd230] rounded-[10px] px-3 py-3 mt-4">
    <div class="flex items-center gap-2 mb-1">
      <div class="size-2.5 bg-[#fe9a00] rounded-full shrink-0"></div>
      <span class="text-[#bb4d00] text-[12px] font-bold uppercase tracking-wide">Capacidad Aceptable</span>
    </div>
    <p class="text-[#e17100] text-[12px]">Operación viable con recursos actuales</p>
  </div>

  <div class="border-t border-[#e5e7eb] mt-4 pt-3">
    <p class="text-[#6a7282] text-[12px] italic">ℹ️ Este widget mide capacidad logística. La gestión de licencias queda a criterio del Administrador.</p>
  </div>
</div>
