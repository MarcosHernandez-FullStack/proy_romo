<aside class="flex flex-col h-screen w-[256px] shrink-0 shadow-[0px_25px_50px_0px_rgba(0,0,0,0.25)]"
  style="background: linear-gradient(to bottom, #0f172b, #1d293d)">

  <!-- Logo -->
  <div class="flex items-center gap-3 px-6 py-6 border-b border-[#314158] shrink-0">
    <div class="size-10 rounded-[10px] flex items-center justify-center shrink-0"
      style="background: linear-gradient(135deg, #2b7fff 0%, #155dfc 100%)">
      <lucide-angular [img]="ShieldIcon" class="size-6" color="white" [strokeWidth]="1.5" />
    </div>
    <div class="flex flex-col">
      <span class="text-white text-[18px] font-bold leading-7">Admin Panel</span>
      <span class="text-[#8ec5ff] text-[12px] leading-4">Sistema de Gestión</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 flex flex-col gap-1 px-4 pt-4 overflow-y-auto">
    @for (item of navItems; track item.path) {
      <a [routerLink]="item.path" routerLinkActive="bg-[#155dfc] shadow-[0px_10px_15px_0px_rgba(0,0,0,0.1),0px_4px_6px_0px_rgba(0,0,0,0.1)]"
        class="flex items-center gap-3 h-12 px-4 rounded-[10px] transition-colors cursor-pointer group"
        [routerLinkActiveOptions]="{ exact: false }">
        <lucide-angular [img]="item.icon" class="size-5 shrink-0"
          color="#d1d5dc" [strokeWidth]="1.5" />
        <span class="text-[#d1d5dc] text-[16px] font-medium">{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- Cerrar Sesión -->
  <div class="border-t border-[#314158] px-4 py-4 shrink-0">
    <button type="button" (click)="adminSvc.logoutAdmin()"
      class="flex items-center gap-3 h-12 px-4 rounded-[10px] w-full hover:bg-[rgba(255,255,255,0.05)] transition-colors cursor-pointer">
      <lucide-angular [img]="LogOutIcon" class="size-5 shrink-0" color="#d1d5dc" [strokeWidth]="1.5" />
      <span class="text-[#d1d5dc] text-[16px] font-medium">Cerrar Sesión</span>
    </button>
  </div>
</aside>
